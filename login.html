<!DOCTYPE html>
<html lang="en">
<head>
    <title>E-Waste - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial;
            background: linear-gradient(to right, #2c5364, #203a43, #0f2027);
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .container {
            background: white; padding: 40px;
            border-radius: 12px; width: 380px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .container h2 { color: #0a8dad; margin-bottom: 5px; font-size: 22px; }
        .tabs { display: flex; margin: 20px 0 25px 0; border-bottom: 2px solid #eee; }
        .tab {
            flex: 1; padding: 10px; cursor: pointer; font-weight: bold;
            color: #888; border-bottom: 3px solid transparent; transition: 0.3s;
        }
        .tab.active { color: #198754; border-bottom: 3px solid #198754; }
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #555; }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%; padding: 12px 15px; border: 1px solid #ddd;
            border-radius: 6px; font-size: 15px; outline: none;
            transition: border 0.3s;
        }
        input:focus { border-color: #198754; }
        .btn-submit {
            width: 100%; padding: 13px; background: #198754;
            color: white; border: none; border-radius: 6px;
            font-size: 16px; cursor: pointer; margin-top: 10px;
            transition: background 0.3s;
        }
        .btn-submit:hover { background: #0b5d1e; }
        .form-panel { display: none; }
        .form-panel.active { display: block; }
        .logo { font-size: 40px; margin-bottom: 10px; }
        .back-link { display: block; margin-top: 20px; color: #0a8dad; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">♻️</div>
        <h2>E-Waste Collection System</h2>
        <p style="color:#888; font-size:13px; margin-top:5px;">Login ya Register karein</p>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="showTab('login')">Login</div>
            <div class="tab" onclick="showTab('register')">Register</div>
        </div>

        <!-- Login Form - Database se connected -->
        <div class="form-panel active" id="login-panel">
            <form action="/login" method="POST">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-submit">Login</button>
            </form>
        </div>

        <!-- Register Form - Database se connected -->
        <div class="form-panel" id="register-panel">
            <form action="/register" method="POST">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Create a password (min 6 chars)" required minlength="6">
                </div>
                <button type="submit" class="btn-submit">Register</button>
            </form>
        </div>

        <a href="/" class="back-link">← Home Page Par Jayen</a>
    </div>

    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(tab + '-panel').classList.add('active');
            document.querySelectorAll('.tab').forEach(t => {
                if (t.textContent.toLowerCase().includes(tab)) t.classList.add('active');
            });
        }
    </script>
</body>
</html>
